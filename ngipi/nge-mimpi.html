<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NGIPI!</title>

  <link rel="stylesheet" href="src/style.css">
  <link rel="shortcut icon" href="/ngipi-icon.ico" type="image/x-icon">
</head>

<body>

  <h1>NGIPI!</h1>

  <!-- LIST CARD -->
  <section class="card-list" id="cardList">

    <p class="small-text">Tulis mimpi atau apapun seperti sarkas dll, disini!</p>

  </section>



  <!-- FLOATING INPUT PANEL -->

  <div class="input-panel">

    <input 
      type="text"
      id="goalInput"
      placeholder="Nama tujuan..."
    >

    <input
      type="number"
      id="desireInput"
      placeholder="Persentase keinginan (0-100)"
      min="0"
      max="100"
    >

    <input
      type="number"
      id="moneyInput"
      placeholder="Investasi (opsional)"
    >

    <button id="addBtn">
      Add to List
    </button>

    <p class="small-text">
      Isi tujuan lalu klik tombol
    </p>

    <br><br>
    <p class="small-text">
      Info
    </p>
    
    <a href="info.html">
      <button>Info</button>
    </a>

  </div>
  
  <footer>
    <p>&copy; 2026 NGIPI! Gabut Web!</p>
  </footer>

  <script src="src/script.js" type="module"></script>

  <!-- 100% privacy-first analytics -->
  <script async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
  <noscript><img src="https://queue.simpleanalyticscdn.com/noscript.gif" alt="" referrerpolicy="no-referrer-when-downgrade"/></noscript>
</body>
</html>
