<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembuat Keputusan - NGIPI!</title>

    <link rel="stylesheet" href="src/pembuat-keputusan.css">
</head>
<body>
    <header>
        <h1>Pembuat Keputusan</h1>
    </header>

    <input type="text" id="input" placeholder="Masukkan keputusan">
    <button style="background-color: #4361ee; color: #ffffff; border: none; padding: 8px 16px; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease;" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 4px 12px rgba(0,0,0,0.15)';" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='none';" id="btn">Submit</button>

    <p>Hasil:</p>

    <p id="output"></p>

    <hr>
    <footer>
        <p>&copy; 2026 NGIPI! Projek web paling gabut.</p>
    </footer>

    <script src="src/pembuat-keputusan.js"></script>
</body>
</html>
