<body>

  <h1>NGIPI!</h1>

  <!-- LIST CARD -->
  <section class="card-list" id="cardList">

    <p class="small-text">Tulis mimpi atau apapun seperti sarkas dll, disini!</p>

  </section>



  <!-- FLOATING INPUT PANEL -->

  <div class="input-panel">

    <input 
      type="text"
      id="goalInput"
      placeholder="Nama tujuan..."
    >

    <input
      type="number"
      id="desireInput"
      placeholder="Persentase keinginan (0-100)"
      min="0"
      max="100"
    >

    <input
      type="number"
      id="moneyInput"
      placeholder="Investasi (opsional)"
    >

    <button id="addBtn">
      Add to List
    </button>

    <p class="small-text">
      Isi tujuan lalu klik tombol
    </p>

  </div>
